<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Will You Be My Girlfriend?</title>
	<style>
		:root{--bg:#0f1724;--card:#0b1220;--accent:#ff5c8a;--muted:#9aa4b2}
		*{box-sizing:border-box;font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial}
		html,body{height:100%;margin:0;background:radial-gradient(ellipse at 10% 10%, rgba(255,92,138,0.12), transparent 10%),
			linear-gradient(180deg,#061021 0%, #071427 50%, #081827 100%);color:#e6eef6}
		.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
		.card{width:100%;max-width:720px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
			border:1px solid rgba(255,255,255,0.04);padding:32px;border-radius:16px;backdrop-filter:blur(6px);box-shadow:0 8px 40px rgba(2,6,23,0.6)}
		header{display:flex;gap:16px;align-items:center}
		.avatar{width:72px;height:72px;border-radius:16px;background:linear-gradient(135deg,var(--accent),#7be5ff);display:flex;align-items:center;justify-content:center;font-weight:700;color:#061021}
		h1{font-size:20px;margin:0}
		p.lead{color:var(--muted);margin:6px 0 18px}
		.question{font-size:28px;margin:12px 0 8px;line-height:1.05}
		.hearts{display:flex;gap:8px;margin-bottom:18px}
		.heart{width:14px;height:14px;border-radius:50%;background:linear-gradient(180deg,var(--accent),#ff8fb5);box-shadow:0 4px 14px rgba(255,92,138,0.18)}
		.controls{display:flex;gap:12px}
		button{cursor:pointer;padding:12px 18px;border-radius:12px;border:0;font-weight:600}
		.yes{background:linear-gradient(90deg,#4ee8c4,#32b0ff);color:#022334}
		.no{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted)}
		.confetti{pointer-events:none;position:absolute;inset:0;overflow:hidden}
		.result{margin-top:18px;padding:16px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);display:none}
		.emoji{font-size:44px}
		.note{color:var(--muted);font-size:14px;margin-top:8px}
		/* playful move for the no button */
		.no.move{transform:translateX(140px) translateY(-8px);transition:transform .35s}
		@media (max-width:520px){.question{font-size:22px}.controls{flex-direction:column}button{width:100%}}
	</style>
</head>
<body>
	<div class="wrap">
		<div class="card" role="main">
			<header>
				<div class="avatar">💌</div>
				<div>
					<h1>Can I ask you something?</h1>
					<p class="lead">This is important to me — please be honest ❤️</p>
				</div>
			</header>

			<div style="margin-top:18px">
				<div class="question">Will you be my girlfriend?</div>
				<div class="hearts" aria-hidden>
					<div class="heart"></div><div class="heart"></div><div class="heart"></div><div class="heart"></div>
				</div>

				<div class="controls">
					<button class="yes" id="yesBtn">Yes — I'd love to 💕</button>
					<button class="no" id="noBtn">No — I'm sorry</button>
				</div>

				<div class="result" id="result" role="status" aria-live="polite">
					<div class="emoji" id="resultEmoji">🙂</div>
					<div id="resultText" style="margin-top:8px;font-weight:600"></div>
					<div class="note" id="resultNote"></div>
				</div>
			</div>
		</div>
	</div>
    <div style="text-align:center; margin-top:16px; color:#cbd5e1;">
        <a href="index.html" style="color:#7dd3fc; text-decoration:none;">← Back to Home</a>
    </div>

    <canvas class="confetti" id="confettiCanvas"></canvas>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const result = document.getElementById('result');
        const resultEmoji = document.getElementById('resultEmoji');
        const resultText = document.getElementById('resultText');
        const resultNote = document.getElementById('resultNote');
        const confettiCanvas = document.getElementById('confettiCanvas');
        const responseKey = 'girlfriendResponse';
        const responseTimeKey = 'girlfriendResponseTime';

        function saveResponse(answer) {
            localStorage.setItem(responseKey, answer);
            localStorage.setItem(responseTimeKey, new Date().toLocaleString());
        }

        function showResult(answer, emoji, text, note) {
            result.style.display = 'block';
            resultEmoji.textContent = emoji;
            resultText.textContent = text;
            resultNote.textContent = note;
            saveResponse(answer);
        }

        // playful evasive behavior for No button
        let moved = false;
        noBtn.addEventListener('mouseenter', ()=>{
            if(!moved){
                noBtn.classList.add('move');
                moved = true;
            } else {
                noBtn.style.transform = 'translateX(-12px) translateY(6px)';
                setTimeout(()=>noBtn.style.transform = '',300);
            }
        });

        yesBtn.addEventListener('click', ()=>{
            showResult('Yes', '🥰', 'Yes! I would be honored to be your girlfriend.', 'Thank you for asking so sweetly — this means a lot.');
            launchConfetti();
        });

        noBtn.addEventListener('click', ()=>{
            showResult('No', '🤍', 'I appreciate your courage. Let’s stay friends?', 'Either way, I respect you and your feelings.');
        });

        function launchConfetti(){
            const ctx = confettiCanvas.getContext('2d');
            const w = confettiCanvas.width = innerWidth;
            const h = confettiCanvas.height = innerHeight;
            const pieces = [];
            for(let i=0;i<120;i++) pieces.push({x:Math.random()*w,y:Math.random()*-h,vy:2+Math.random()*6, size:4+Math.random()*8, color:`hsl(${Math.random()*50+320},90%,60%)`});
            let t=0;
            const id = setInterval(()=>{
                t++; ctx.clearRect(0,0,w,h);
                for(const p of pieces){
                    p.x += Math.sin(t/10 + p.size)*0.8;
                    p.y += p.vy;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x,p.y,p.size,p.size*0.6);
                }
                if(t>140){ clearInterval(id); ctx.clearRect(0,0,w,h); }
            },16);
        }
    </script>
</body>
</html>
